<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>생각의 렌즈 분석 결과</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221015",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen antialiased selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-3 justify-between border-b border-primary/10">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">생각의 렌즈 분석 결과</h2>
</div>
<div class="p-5 flex flex-col gap-6">
<!-- Dilemma Section -->
<div class="flex flex-col gap-2">
<h3 class="text-sm font-semibold tracking-wide text-primary uppercase flex items-center gap-2">
<span class="material-symbols-outlined text-base">psychology</span>
                당신의 딜레마
            </h3>
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 shadow-sm border border-primary/5 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
<p class="text-lg font-medium leading-relaxed relative z-10">
                    지금 이직하는 것이 맞을까, 아니면 좀 더 버텨야 할까?
                </p>
</div>
</div>
<!-- Lens 1 Section -->
<div class="flex flex-col gap-4">
<h2 class="text-xl font-bold leading-tight flex items-center gap-2 border-b border-primary/10 pb-2">
<span class="material-symbols-outlined text-primary">finance</span>
                렌즈 1: 경제적 관점
            </h2>
<!-- Verdict Badge -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-primary/10">
<div class="flex items-center gap-4 flex-1">
<div class="flex items-center justify-center rounded-full bg-primary/10 text-primary shrink-0 size-12">
<span class="material-symbols-outlined">warning</span>
</div>
<div class="flex flex-col justify-center">
<div class="flex items-center gap-2 mb-1">
<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400">주의</span>
<p class="text-base font-semibold leading-none">매몰비용 오류</p>
</div>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-snug">지금까지 투자한 시간에 얽매이지 마세요.</p>
</div>
</div>
</div>
<!-- Reflection Questions -->
<div class="flex flex-col gap-3 mt-2">
<h4 class="text-sm font-semibold text-slate-500 dark:text-slate-400 pl-1">심층 질문</h4>
<div class="bg-gradient-to-br from-primary/5 to-transparent rounded-xl p-5 border border-primary/10 hover:border-primary/30 transition-colors group cursor-pointer">
<div class="flex gap-3">
<span class="text-primary font-bold opacity-50 group-hover:opacity-100 transition-opacity">01.</span>
<p class="text-base font-medium leading-relaxed">만약 오늘 이 회사에 처음 입사했다면, 내일 당장 그만두고 싶을까요?</p>
</div>
</div>
<div class="bg-gradient-to-br from-primary/5 to-transparent rounded-xl p-5 border border-primary/10 hover:border-primary/30 transition-colors group cursor-pointer">
<div class="flex gap-3">
<span class="text-primary font-bold opacity-50 group-hover:opacity-100 transition-opacity">02.</span>
<p class="text-base font-medium leading-relaxed">이직 시 얻게 될 '새로운 기회비용'은 현재의 연봉 차이보다 클까요?</p>
</div>
</div>
<div class="bg-gradient-to-br from-primary/5 to-transparent rounded-xl p-5 border border-primary/10 hover:border-primary/30 transition-colors group cursor-pointer">
<div class="flex gap-3">
<span class="text-primary font-bold opacity-50 group-hover:opacity-100 transition-opacity">03.</span>
<p class="text-base font-medium leading-relaxed">지금의 안정감이 성장의 두려움을 포장하고 있지는 않나요?</p>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Action -->
<div class="mt-auto p-5 pb-8 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent pt-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white rounded-xl py-4 font-bold text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            다음 렌즈 확인하기
            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</body></html>
