<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>편향 캐릭터 찾기 채팅</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221015",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 sm:p-0">
<div class="relative flex h-full min-h-[800px] w-full max-w-[400px] flex-col bg-white dark:bg-slate-900 overflow-x-hidden shadow-2xl sm:rounded-[3rem] border-8 border-slate-900 dark:border-slate-800">
<!-- Top Bar -->
<div class="sticky top-0 z-10 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="뒤로가기" class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">편향 캐릭터 찾기</h2>
</div>
<!-- Progress -->
<div class="flex flex-col gap-2 p-4 pt-0">
<div class="flex gap-6 justify-between items-center">
<p class="text-sm font-medium leading-normal text-slate-600 dark:text-slate-400">진행도</p>
<p class="text-sm font-bold leading-normal text-primary">3 / 10</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary transition-all duration-500 ease-out" style="width: 30%;"></div>
</div>
</div>
</div>
<!-- Chat Area -->
<div class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
<!-- Previous Question (Optional Context) -->
<div class="flex flex-col gap-2">
<div class="flex items-end gap-3 self-end flex-row-reverse">
<div class="flex flex-1 flex-col gap-1 items-end">
<p class="text-sm font-normal leading-normal max-w-[280px] rounded-2xl rounded-br-none px-4 py-3 bg-primary text-white shadow-sm">
                        스트레스 받을 때 주로 쇼핑을 해요.
                    </p>
</div>
</div>
</div>
<!-- AI Message -->
<div class="flex items-end gap-3">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full w-10 shrink-0 shadow-sm border border-slate-100 dark:border-slate-800" data-alt="AI 상담사 아바타" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBn06Akr5UYURIQYKYk1Prx6HkCsRHAhlCvuJSsY8GvMn3ewxOj-dGceRnl5arqS2eQULMqUVqzx7GsyueJVxda9PYHZhEe5mzcPyb9L0MSzfExBydT83ikJ35m0H3O_yIkasWSj9Yc0V1dICSq9-KuneZGrk69t_SH_-quWh8soZ7odvNEOp0SyKn5xaINyjYyqXDRZGZBqPIjSpln5fYK1406yaC347g7tAcsCWGbBUHHRey0kf9ynw4-jzVqGo3PEF8U63wkrInv');"></div>
<div class="flex flex-1 flex-col gap-1 items-start">
<p class="text-xs font-medium leading-normal ml-2 text-slate-500 dark:text-slate-400">뇌피셜 상담사</p>
<p class="text-sm sm:text-base font-medium leading-relaxed max-w-[280px] rounded-2xl rounded-bl-none px-4 py-3 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 shadow-sm">
                    그렇군요! 가장 최근에 충동구매를 했을 때 어떤 기분이었나요? 솔직하게 알려주세요.
                </p>
</div>
</div>
</div>
<!-- Input Area -->
<div class="bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 p-4 pb-6 flex flex-col gap-3 rounded-b-[2.5rem]">
<!-- Quick Actions -->
<div class="flex flex-col gap-2 w-full">
<button class="flex items-center justify-start overflow-hidden rounded-xl p-4 bg-primary/10 hover:bg-primary/20 text-primary text-sm font-bold leading-normal transition-colors text-left border border-primary/20 shadow-sm">
<span class="material-symbols-outlined mr-3 text-lg">sentiment_very_satisfied</span>
<span class="truncate">스트레스가 풀렸어요! 짜릿했어요.</span>
</button>
<button class="flex items-center justify-start overflow-hidden rounded-xl p-4 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal transition-colors text-left border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined mr-3 text-lg">sentiment_dissatisfied</span>
<span class="truncate">사고 나서 조금 후회됐어요.</span>
</button>
<button class="flex items-center justify-start overflow-hidden rounded-xl p-4 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal transition-colors text-left border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined mr-3 text-lg">sentiment_neutral</span>
<span class="truncate">잘 기억이 나지 않아요.</span>
</button>
</div>
<!-- Custom Input -->
<div class="flex w-full items-center gap-2 mt-2">
<div class="relative flex-1">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-full h-12 pl-4 pr-12 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-500 dark:placeholder:text-slate-400" placeholder="직접 입력하기..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-primary text-white rounded-full flex items-center justify-center hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-[18px]">arrow_upward</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
