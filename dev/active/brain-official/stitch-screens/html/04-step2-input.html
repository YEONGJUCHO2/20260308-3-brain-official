<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee2b5b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221015",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex justify-center w-full min-h-screen">
<div class="w-full max-w-md bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative overflow-x-hidden shadow-2xl">
<div class="flex items-center p-4 justify-between sticky top-0 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm z-10 border-b border-primary/10">
<button class="text-[#1b0d11] dark:text-white flex size-10 items-center justify-center rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-[#1b0d11] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">고민 입력</h2>
<div class="size-10"></div>
</div>
<div class="flex w-full px-6 py-4 items-center justify-center gap-2">
<div class="h-1.5 flex-1 rounded-full bg-primary/20"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary shadow-[0_0_8px_rgba(238,43,91,0.5)]"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary/20"></div>
</div>
<div class="px-5 pt-4 pb-2">
<h1 class="text-[#1b0d11] dark:text-white text-[28px] font-bold leading-tight mb-2">어떤 고민이 있으신가요?</h1>
<p class="text-[#1b0d11]/70 dark:text-white/70 text-base font-normal leading-normal mb-6">요즘 당신을 잠 못 들게 하는 고민을 자유롭게 적어주세요.</p>
<div class="relative w-full">
<textarea class="flex w-full min-h-[180px] p-4 rounded-xl border border-primary/20 bg-white/50 dark:bg-white/5 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary resize-none text-[#1b0d11] dark:text-white placeholder:text-[#1b0d11]/40 dark:placeholder:text-white/40 shadow-inner" placeholder="요즘 당신을 잠 못 들게 하는 고민은 무엇인가요? (최대 500자)"></textarea>
<div class="absolute bottom-4 right-4 text-xs font-medium text-[#1b0d11]/40 dark:text-white/40">0 / 500</div>
</div>
</div>
<div class="px-5 py-6 flex-1">
<h2 class="text-[#1b0d11] dark:text-white text-xl font-bold mb-1">어떤 렌즈로 바라볼까요?</h2>
<p class="text-[#1b0d11]/70 dark:text-white/70 text-sm mb-5">다양한 관점에서 고민을 분석해 드립니다.</p>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-5 rounded-xl border-2 border-primary bg-primary/10 text-primary shadow-sm relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5"></div>
<span class="material-symbols-outlined text-[32px] mb-3 relative z-10">psychology</span>
<span class="font-bold text-base relative z-10">심리학</span>
<span class="text-xs mt-1 opacity-80 relative z-10">마음의 움직임</span>
</button>
<button class="flex flex-col items-center justify-center p-5 rounded-xl border border-primary/20 bg-white/50 dark:bg-white/5 text-[#1b0d11]/80 dark:text-white/80 hover:border-primary/50 hover:bg-primary/5 shadow-sm">
<span class="material-symbols-outlined text-[32px] mb-3">account_balance</span>
<span class="font-bold text-base">경제학</span>
<span class="text-xs mt-1 opacity-60">합리적 선택</span>
</button>
<button class="flex flex-col items-center justify-center p-5 rounded-xl border border-primary/20 bg-white/50 dark:bg-white/5 text-[#1b0d11]/80 dark:text-white/80 hover:border-primary/50 hover:bg-primary/5 shadow-sm">
<span class="material-symbols-outlined text-[32px] mb-3">history_edu</span>
<span class="font-bold text-base">역사학</span>
<span class="text-xs mt-1 opacity-60">과거의 지혜</span>
</button>
<button class="flex flex-col items-center justify-center p-5 rounded-xl border border-primary/20 bg-white/50 dark:bg-white/5 text-[#1b0d11]/80 dark:text-white/80 hover:border-primary/50 hover:bg-primary/5 shadow-sm">
<span class="material-symbols-outlined text-[32px] mb-3">self_improvement</span>
<span class="font-bold text-base">철학</span>
<span class="text-xs mt-1 opacity-60">존재의 이유</span>
</button>
</div>
</div>
<div class="p-5 mt-auto bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full py-4 rounded-xl bg-primary text-white font-bold text-lg shadow-[0_8px_16px_rgba(238,43,91,0.25)] hover:bg-[#d92350] flex items-center justify-center gap-2">
                심층 분석 시작하기
                <span class="material-symbols-outlined text-[22px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
